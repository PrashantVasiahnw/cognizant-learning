<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Statement Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-light">
  <main class="container mt-5 mb-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="mb-4">Statement Manager</h1>

        <section>
          <form id="addForm" class="row g-2 mb-4">
            <div class="col-md-2">
              <input id="date" type="date" class="form-control" />
            </div>
            <div class="col-md-3">
              <input id="header" type="text" class="form-control" placeholder="Header (e.g., Salary)" />
            </div>
            <div class="col-md-2">
              <input id="credit" type="number" class="form-control" placeholder="Credit" min="0" />
            </div>
            <div class="col-md-2">
              <input id="debit" type="number" class="form-control" placeholder="Debit" min="0" />
            </div>
            <div class="col-md-2">
              <button id="addBtn" type="button" class="btn btn-primary w-100">Add</button>
            </div>
          </form>

          <div class="row g-2 p-3 bg-secondary-subtle rounded-top fw-bold">
            <div class="col-md-1">#</div>
            <div class="col-md-2">Date</div>
            <div class="col-md-3">Header</div>
            <div class="col-md-2">Credit</div>
            <div class="col-md-2">Debit</div>
            <div class="col-md-2">Actions</div>
          </div>

          <div id="stmtRows"></div>

          <div class="mt-4 pt-3 border-top">
            <div class="row g-2 mb-3 p-3 bg-light rounded">
              <div class="col-md-6 fw-bold">Totals</div>
              <div class="col-md-2 text-end"><strong><span id="totalCredit">0</span></strong></div>
              <div class="col-md-2 text-end"><strong><span id="totalDebit">0</span></strong></div>
              <div class="col-md-2"></div>
            </div>
            <div class="row g-2 p-3 bg-white rounded">
              <div class="col-md-8 fw-bold">Balance</div>
              <div class="col-md-4 text-end"><strong><span id="balance">0</span></strong></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="lib/script.js"></script>
</body>
</html>
